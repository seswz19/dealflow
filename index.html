<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Property Scout</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0f1115">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DealFlow">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  :root{--bg:#0f1115;--panel:#181b22;--panel2:#1f232c;--line:#2a2f3a;--txt:#e8eaee;
    --mut:#9aa3b2;--acc:#4f9cf9;--good:#33c27f;--warn:#f5b942;--bad:#ef5d5d;--chip:#262b35;--shadow:rgba(0,0,0,.5);
    --glass:rgba(20,23,30,.78)}
  [data-theme="light"]{--bg:#f4f6fa;--panel:#fff;--panel2:#eef1f6;--line:#dde2ea;--txt:#15181e;
    --mut:#5d6675;--acc:#1f6feb;--chip:#eef1f6;--shadow:rgba(20,30,50,.12);--glass:rgba(255,255,255,.82)}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{margin:0;font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg);color:var(--txt);overflow:hidden}

  /* ---- full-screen map ---- */
  #map{position:fixed;inset:0;z-index:0}

  /* ---- condensed floating dashboard ---- */
  .hud{position:fixed;top:calc(env(safe-area-inset-top) + 10px);left:50%;transform:translateX(-50%);
    z-index:600;display:flex;align-items:center;gap:10px;max-width:calc(100vw - 24px);
    background:var(--glass);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);
    border:1px solid var(--line);border-radius:14px;padding:7px 10px;box-shadow:0 6px 24px var(--shadow)}
  .hud .brand{display:flex;flex-direction:column;line-height:1.1;padding:0 4px 0 2px}
  .hud .brand b{font-size:14px;font-weight:680;white-space:nowrap}
  .hud .brand span{color:var(--mut);font-size:10px;white-space:nowrap}
  .hstats{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none}
  .hstats::-webkit-scrollbar{display:none}
  .hstat{flex:0 0 auto;text-align:center;padding:2px 9px;border-left:1px solid var(--line)}
  .hstat b{display:block;font-size:15px;font-weight:700;line-height:1}
  .hstat span{color:var(--mut);font-size:9.5px;text-transform:uppercase;letter-spacing:.3px}

  /* ---- floating action buttons (top-right) ---- */
  .fabs{position:fixed;top:calc(env(safe-area-inset-top) + 10px);right:12px;z-index:600;
    display:flex;flex-direction:column;gap:8px}
  .fab{width:42px;height:42px;border-radius:12px;border:1px solid var(--line);background:var(--glass);
    -webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);color:var(--txt);font-size:18px;cursor:pointer;
    box-shadow:0 4px 16px var(--shadow);display:flex;align-items:center;justify-content:center;position:relative}
  .fab.on{background:var(--acc);color:#fff;border-color:var(--acc)}
  .fab .badge{position:absolute;top:-5px;right:-5px;background:var(--good);color:#04130b;font-size:10px;
    font-weight:700;border-radius:999px;min-width:17px;height:17px;padding:0 4px;display:flex;align-items:center;justify-content:center}

  /* ---- slide-in list panel ---- */
  .panel{position:fixed;top:0;right:0;bottom:0;width:390px;max-width:90vw;z-index:900;
    background:var(--bg);border-left:1px solid var(--line);box-shadow:-8px 0 30px var(--shadow);
    transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
  .panel.on{transform:translateX(0)}
  .phead{padding:calc(env(safe-area-inset-top) + 12px) 14px 10px;border-bottom:1px solid var(--line);background:var(--bg)}
  .phead .row{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .phead h2{margin:0;font-size:16px;font-weight:680}
  .x{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:9px;width:32px;height:32px;font-size:16px;cursor:pointer}
  .controls{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}
  .controls select,.controls input{background:var(--panel2);color:var(--txt);border:1px solid var(--line);
    border-radius:9px;padding:7px 9px;font-size:12.5px}
  .controls input{flex:1;min-width:120px}
  .seg{display:flex;width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .seg button{flex:1;background:none;border:none;color:var(--mut);padding:7px 4px;font-size:12.5px;cursor:pointer}
  .seg button.on{background:var(--acc);color:#fff}
  .count{color:var(--mut);font-size:12px;padding:10px 16px 0}
  .list{flex:1;overflow:auto;padding:4px 10px 30px}
  .card{position:relative;background:var(--panel);border:1px solid var(--line);border-radius:13px;
    padding:11px 12px;margin:8px 2px;display:flex;gap:10px;align-items:flex-start;cursor:pointer;box-shadow:0 1px 3px var(--shadow)}
  .card.bb{border-color:#2f6b4f;box-shadow:0 0 0 1px #2f6b4f33 inset}
  .card.sel{outline:2px solid var(--acc);outline-offset:-1px}
  .rank{flex:0 0 auto;width:24px;text-align:center;color:var(--mut);font-size:12px;font-weight:600;padding-top:3px}
  .cbody{flex:1;min-width:0}
  .addr{font-weight:620;font-size:14px;padding-right:52px}
  .loc{color:var(--mut);font-size:12px;margin-top:1px}
  .meta{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
  .chip{background:var(--chip);border-radius:999px;padding:3px 8px;font-size:11px;color:var(--mut)}
  .chip.price{color:var(--txt);font-weight:600}.chip.gap{color:var(--good)}.chip.drop{color:var(--warn)}.chip.new{color:var(--good)}
  .score{flex:0 0 auto;text-align:center;width:46px}
  .score b{display:block;font-size:20px;font-weight:720;line-height:1}.score small{color:var(--mut);font-size:10px}
  .g-A{color:#33c27f}.g-B{color:#7ec8ff}.g-C{color:#f5b942}.g-D,.g-F{color:#ef5d5d}
  .bbtag{display:inline-block;background:#2f6b4f;color:#dffaeb;font-size:9.5px;font-weight:700;border-radius:6px;padding:1px 6px;margin-left:6px;vertical-align:1px}
  .acts{position:absolute;top:9px;right:9px;display:flex;gap:4px}
  .acts button{background:var(--panel2);border:1px solid var(--line);border-radius:8px;width:26px;height:26px;cursor:pointer;font-size:12px;color:var(--mut)}
  .acts button.fav{color:#f5b942;border-color:#f5b94255}
  .empty{text-align:center;color:var(--mut);padding:40px 20px}

  /* ---- legend panel (slides from left) ---- */
  .legend{position:fixed;top:0;left:0;bottom:0;width:330px;max-width:88vw;z-index:900;
    background:var(--bg);border-right:1px solid var(--line);box-shadow:8px 0 30px var(--shadow);
    transform:translateX(-100%);transition:transform .26s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
  .legend.on{transform:translateX(0)}
  .legend .lbody{flex:1;overflow:auto;padding:6px 16px 30px;font-size:13px}
  .legend h3{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--mut);margin:18px 0 7px}
  .lrow{display:flex;align-items:flex-start;gap:9px;margin:7px 0}
  .dot{flex:0 0 auto;width:14px;height:14px;border-radius:50%;margin-top:2px;border:1.5px solid rgba(255,255,255,.25)}
  .lkey{flex:0 0 auto;font-weight:600;min-width:26px}
  .lrow .ltxt{color:var(--mut);font-size:12.5px}
  .lrow .ltxt b{color:var(--txt);font-weight:600}

  /* ---- detail sheet ---- */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:none}
  .overlay.on{display:block}
  .sheet{position:fixed;left:50%;transform:translate(-50%,120%);bottom:0;z-index:1001;width:520px;max-width:96vw;
    background:var(--bg);border:1px solid var(--line);border-bottom:none;
    border-radius:18px 18px 0 0;padding:8px 18px calc(env(safe-area-inset-bottom) + 22px);max-height:80vh;overflow:auto;
    transition:transform .24s cubic-bezier(.4,0,.2,1);box-shadow:0 -8px 40px var(--shadow)}
  .sheet.on{transform:translate(-50%,0)}
  .grab{width:38px;height:4px;background:var(--line);border-radius:3px;margin:6px auto 12px}
  .sheet h2{margin:.2em 0 0;font-size:19px}
  .dgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0}
  .d{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:9px 12px}
  .d span{display:block;color:var(--mut);font-size:11px}.d b{font-size:15px}
  .blink{display:block;text-align:center;background:var(--acc);color:#fff;text-decoration:none;border-radius:11px;padding:11px;margin-top:8px;font-weight:600}
  .b2{background:var(--panel2);color:var(--txt);border:1px solid var(--line)}
  .leaflet-popup-content{font:13px -apple-system,sans-serif}
  .leaflet-control-zoom{margin-bottom:26px!important}
  a{color:var(--acc)}
  @media(max-width:560px){
    .hud .brand span{display:none}
    .sheet{border-radius:18px 18px 0 0}
  }
</style>
</head>

S=["Condo", "Multi-Family", "Single Family", "Townhouse"], STAT={"total": 1190, "bb": 92, "new": 850, "drop": 241, "avg": 60.5};
const $=s=>document.querySelector(s);
const store=(k,d)=>{try{return JSON.parse(localStorage.getItem(k))??d}catch(e){return d}};
const save=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}};
let favs=new Set(store("ps_favs",[])), hid=new Set(store("ps_hid",[]));
let state={f:"all",county:"",beds:0,type:"",sort:"rank",q:""};
let selId=null;
const byId={}; DATA.forEach(d=>byId[d.id]=d);

// theme
const setTheme=t=>{document.documentElement.dataset.theme=t;save("ps_theme",t);
  document.querySelector('meta[name=theme-color]').content=(t==="light"?"#f4f6fa":"#0f1115")};
setTheme(store("ps_theme","dark"));

// condensed stats + selects
$("#stats").innerHTML=`
 <div class="hstat"><b>${STAT.total}</b><span>list</span></div>

COUNTIES.forEach(c=>$("#county").add(new Option(c,c)));

const fmt=n=>n==null?"—":"$"+Math.round(n).toLocaleString();
const grade=g=>g?`<span class="g-${g}">${g}</span>`:"—";

function passes(d){
  if(hid.has(d.id)&&state.f!=="fav")return false;
  if(state.f==="bb"&&!d.bb)return false;
  if(state.f==="new"&&d.st!=="New Today")return false;
  if(state.f==="drop"&&d.st!=="Price Drop")return false;
  if(state.f==="fav"&&!favs.has(d.id))return false;
  if(state.county&&d.c!==state.county)return false;
  if(state.type&&d.ty!==state.type)return false;
  if(state.beds&&(d.bd||0)<state.beds)return false;
  if(state.q){const q=state.q.toLowerCase();if(!(d.a.toLowerCase().includes(q)||d.t.toLowerCase().includes(q)))return false;}
  return true;
}
function sortKey(d){switch(state.sort){
  case"score":return -(d.s||0);case"gap":return -(d.gap==null?-999:d.gap);
  case"price":return d.p||1e15;case"dom":return -(d.dom||0);default:return d.rank;}}
// overall quality so the best deals draw on top / frame the map
function quality(d){return (d.bb?100000:0)+(d.s||0)*100+(d.gap||0);}

const map=L.map("map",{zoomControl:true}).setView([40.84,-74.04],12);
let tiles;
function setTiles(){if(tiles)map.removeLayer(tiles);
  const dark=document.documentElement.dataset.theme!=="light";
  tiles=L.tileLayer(`https://{s}.basemaps.cartocdn.com/${dark?'dark':'light'}_all/{z}/{x}/{y}{r}.png`,
    {attribution:'&copy; OSM &copy; CARTO',maxZoom:19}).addTo(map);}
setTiles();
let layer=L.layerGroup().addTo(map);
const color=d=>d.bb?"#33c27f":d.s>=80?"#7ec8ff":d.s>=65?"#f5b942":"#8a93a3";

// frame the map on the BEST options, not the whole spread
function fitBest(rows){
  const mapped=rows.filter(d=>d.la!=null);
  if(!mapped.length)return;
  const ranked=[...mapped].sort((a,b)=>quality(b)-quality(a));
  const top=ranked.filter(d=>d.bb||(d.s||0)>=70);
  const use=(top.length>=3?top:ranked.slice(0,Math.max(8,Math.ceil(ranked.length*0.4))));
  map.fitBounds(use.map(d=>[d.la,d.lo]),{padding:[60,60],maxZoom:14});
}

function render(refit){
  const rows=DATA.filter(passes).sort((a,b)=>{const ka=sortKey(a),kb=sortKey(b);return ka<kb?-1:ka>kb?1:0});
  $("#count").textContent=`${rows.length} shown`+(hid.size?` · ${hid.size} dismissed`:"");
  $("#listBadge").textContent=rows.length;
  $("#list").innerHTML=rows.length?rows.map(d=>{
    const ch=[`<span class="chip price">${fmt(d.p)}</span>`];
    if(d.bd)ch.push(`<span class="chip">${d.bd} bd</span>`);
    if(d.ba)ch.push(`<span class="chip">${d.ba} ba</span>`);
    if(d.gap!=null&&d.gap>0)ch.push(`<span class="chip gap">${d.gap}% below median</span>`);
    if(d.st==="Price Drop")ch.push(`<span class="chip drop">Price drop</span>`);
    if(d.st==="New Today")ch.push(`<span class="chip new">New</span>`);
    if(d.dom!=null)ch.push(`<span class="chip">${Math.round(d.dom)} DOM</span>`);
    return `<div class="card ${d.bb?'bb':''} ${d.id===selId?'sel':''}" data-id="${d.id}">
      <div class="rank">#${d.rank}</div>
      <div class="cbody">
        <div class="addr">${d.a}${d.bb?'<span class="bbtag">BUY-BOX</span>':''}</div>
        <div class="loc">${d.t}${d.c?', '+d.c:''}${d.sty?' · '+d.sty:(d.ty?' · '+d.ty:'')}</div>
        <div class="meta">${ch.join('')}</div>
      </div>
      <div class="score"><b>${d.s!=null?Math.round(d.s):'—'}</b><small>score</small>
        <div style="margin-top:3px;font-size:12px">Trend ${grade(d.tg)}</div></div>
      <div class="acts">
        <button class="${favs.has(d.id)?'fav':''}" data-fav="${d.id}">${favs.has(d.id)?'★':'☆'}</button>
        <button data-hide="${d.id}">✕</button>
      </div>
    </div>`;}).join(""):'<div class="empty">No listings match these filters.</div>';

  // draw markers worst-first so the best deals sit on top
  layer.clearLayers();
  const mapped=rows.filter(d=>d.la!=null).sort((a,b)=>quality(a)-quality(b));
  mapped.forEach(d=>{
    const good=d.bb||(d.s||0)>=70;
    L.circleMarker([d.la,d.lo],{radius:d.bb?8:good?6:4.5,color:color(d),weight:1.5,
      fillColor:color(d),fillOpacity:good?.9:.45})
     .on("click",()=>openDetail(d.id))
     .bindTooltip(`${d.a} · ${fmt(d.p)} · ${d.s!=null?Math.round(d.s):'—'}`).addTo(layer);});
  if(refit)fitBest(rows);
}

function openDetail(id){
  const d=byId[id];if(!d)return;
  selId=id;
  const maps=`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(d.a+", "+d.t+" NJ")}`;
  const cell=(l,v)=>`<div class="d"><span>${l}</span><b>${v}</b></div>`;
  $("#sheetbody").innerHTML=`
    <h2>${d.a}${d.bb?'<span class="bbtag">BUY-BOX</span>':''}</h2>
    <div class="loc">${d.t}${d.c?', '+d.c+' County':''}${d.sty?' · '+d.sty:(d.ty?' · '+d.ty:'')} · ${d.st}</div>
    <div class="dgrid">
      ${cell("List price",fmt(d.p))}
      ${cell("Area median",fmt(d.med))}
      ${cell("Below median",d.gap!=null?d.gap+"%":"—")}
      ${cell("Score",(d.s!=null?Math.round(d.s):"—")+" · Trend "+(d.tg||"—"))}
      ${cell("Beds / Baths",(d.bd||"—")+" / "+(d.ba||"—"))}
      ${cell("Days on market",d.dom!=null?Math.round(d.dom):"—")}
      ${cell("Safety (0-10)",d.sf!=null?d.sf:"—")}
      ${cell("Rank",'#'+d.rank+" of "+DATA.length)}
    </div>
    ${d.tr?`<div class="d" style="margin-bottom:8px"><span>Transit</span><b style="font-weight:500;font-size:13px">🚆 ${d.tr}</b></div>`:''}
    <a class="blink" href="${maps}" target="_blank" rel="noopener">Open in Google Maps</a>
    <a class="blink b2" id="d-fav" href="javascript:void 0">${favs.has(d.id)?'★ Saved — tap to remove':'☆ Save to favorites'}</a>`;
  $("#d-fav").onclick=()=>{toggleFav(d.id);openDetail(id);};
  $("#ov").classList.add("on");requestAnimationFrame(()=>$("#sheet").classList.add("on"));
  if(d.la!=null)map.panTo([d.la,d.lo],{animate:true});
  render();
}
function closeDetail(){$("#sheet").classList.remove("on");setTimeout(()=>$("#ov").classList.remove("on"),200);selId=null;render();}
function toggleFav(id){favs.has(id)?favs.delete(id):favs.add(id);save("ps_favs",[...favs]);render();}
function dismiss(id){hid.add(id);save("ps_hid",[...hid]);render();}

function openPanel(){$("#panel").classList.add("on");$("#btnList").classList.add("on");}

  [...$("#seg").children].forEach(b=>b.classList.remove("on"));e.target.classList.add("on");state.f=e.target.dataset.f;render(true);});

  if(fav){e.stopPropagation();toggleFav(fav.dataset.fav);return;}
  if(hide){e.stopPropagation();dismiss(hide.dataset.hide);return;}
  if(card)openDetail(card.dataset.id);});
$("#ov").onclick=closeDetail;

render(false);
fitBest(DATA);

if("serviceWorker" in navigator && location.protocol.startsWith("http")){
  navigator.serviceWorker.register("sw.js").catch(()=>{});
}
